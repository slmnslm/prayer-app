<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Manage Iqama Times</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1, h2 { text-align: center; color: #2c3e50; }
    .section {
      margin: 35px 0;
      padding: 25px;
      background: #f9f9f9;
      border-radius: 12px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #2c3e50;
    }
    input[type="text"], input[type="date"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    .time-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-primary { background: #27ae60; color: white; }
    .btn-primary:hover { background: #219653; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-edit { background: #3498db; color: white; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th { background: #ecf0f1; }
    .actions button {
      margin-right: 6px;
      padding: 8px 14px;
      font-size: 14px;
    }
    .message {
      text-align: center;
      padding: 14px;
      border-radius: 8px;
      margin: 15px 0;
      font-weight: bold;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Panel - Iqama Times Management</h1>
    <p style="text-align:center; color:#7f8c8d;">https://mnh.slmnslm.theworkpc.com</p>

    <!-- Location & Method Settings -->
    <div class="section">
      <h2>Location & Calculation Method</h2>
      <div class="form-group">
        <label>City</label>
        <input type="text" id="city" value="Oakville">
      </div>
      <div class="form-group">
        <label>Country</label>
        <input type="text" id="country" value="Canada">
      </div>
      <div class="form-group">
        <label>Salat Calculation Method</label>
        <select id="method">
          <option value="5">Muslim World League</option>
          <option value="1">University of Islamic Sciences, Karachi</option>
          <option value="4">Egyptian General Authority of Survey</option>
          <option value="2" selected>ISNA (Islamic Society of North America)</option>
          <option value="6">Islamic Union of North America</option>
          <option value="12">Union of Islamic Organisations in France</option>
          <option value="13">Ministry of Awqaf and Islamic Affairs, Kuwait</option>
          <option value="14">One-Seventh of the Night</option>
        </select>
      </div>
      <button onclick="saveSettings()" class="btn-primary" style="width:100%; margin-top:10px;">
        Save Location & Method
      </button>
    </div>

    <!-- Iqama Times Section -->
    <div class="section">
      <h2>Set / Edit Iqama Times for Date Range</h2>
      <form id="iqamaForm">
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="startDate" required>
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input type="date" id="endDate" required>
        </div>
        <div id="rangeInfo" style="font-size:14px; color:#555; margin:10px 0 20px;"></div>

        <div class="form-group">
          <label>Fajr Iqama</label>
          <div class="time-row">
            <select id="fajr_hour" required><option value="">HH</option></select> :
            <select id="fajr_minute" required><option value="">MM</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Dhuhr Iqama</label>
          <div class="time-row">
            <select id="dhuhr_hour" required><option value="">HH</option></select> :
            <select id="dhuhr_minute" required><option value="">MM</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Asr Iqama</label>
          <div class="time-row">
            <select id="asr_hour" required><option value="">HH</option></select> :
            <select id="asr_minute" required><option value="">MM</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Maghrib Iqama</label>
          <div class="time-row">
            <select id="maghrib_hour" required><option value="">HH</option></select> :
            <select id="maghrib_minute" required><option value="">MM</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Isha Iqama</label>
          <div class="time-row">
            <select id="isha_hour" required><option value="">HH</option></select> :
            <select id="isha_minute" required><option value="">MM</option></select>
          </div>
        </div>

        <div style="display:flex; gap:15px; margin-top:25px;">
          <button type="submit" class="btn-primary">Save Iqama Times</button>
          <button type="button" id="clearForm" class="btn-secondary">Clear Form</button>
        </div>
      </form>
      <div id="message" class="message"></div>
    </div>

    <!-- Existing Schedules -->
    <div class="section">
      <h2>Existing Iqama Schedules</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Fajr</th>
            <th>Dhuhr</th>
            <th>Asr</th>
            <th>Maghrib</th>
            <th>Isha</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="entriesBody"></tbody>
      </table>
    </div>

    <div class="note" style="text-align:center; margin-top:30px;">
      <a href="/" style="color:#3498db;">← Back to Main Prayer Times Page</a>
    </div>
  </div>

  <script>
    const prayers = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];
    const startEl = document.getElementById('startDate');
    const endEl = document.getElementById('endDate');
    const msgEl = document.getElementById('message');

    function populateDropdowns() {
      prayers.forEach(p => {
        const hSel = document.getElementById(p + '_hour');
        const mSel = document.getElementById(p + '_minute');
        for (let i = 0; i < 24; i++) {
          let opt = document.createElement('option');
          opt.value = i.toString().padStart(2, '0');
          opt.textContent = opt.value;
          hSel.appendChild(opt);
        }
        [0,5,10,15,20,25,30,35,40,45,50,55].forEach(m => {
          let opt = document.createElement('option');
          opt.value = m.toString().padStart(2, '0');
          opt.textContent = opt.value;
          mSel.appendChild(opt);
        });
      });
    }

    function updateRangeInfo() {
      if (startEl.value && endEl.value) {
        const days = Math.round((new Date(endEl.value) - new Date(startEl.value)) / 86400000) + 1;
        document.getElementById('rangeInfo').textContent = `Will apply to ${days} day${days > 1 ? 's' : ''}`;
      }
    }

    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        document.getElementById('city').value = data.city || "Oakville";
        document.getElementById('country').value = data.country || "Canada";
        document.getElementById('method').value = data.method || 2;
      } catch(e) {}
    }

    async function saveSettings() {
      const city = document.getElementById('city').value.trim();
      const country = document.getElementById('country').value.trim();
      const method = parseInt(document.getElementById('method').value);

      if (!city || !country) {
        showMessage("City and Country are required", "error");
        return;
      }

      try {
        const res = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ city, country, method })
        });
        const result = await res.json();
        showMessage(result.message, res.ok ? "success" : "error");
      } catch (err) {
        showMessage("Failed to save settings", "error");
      }
    }

    // Existing functions (loadEntries, editDate, deleteDate, showMessage, form submit, etc.)
    // ... (keep all your existing admin logic for Iqama times here)

    // Initialize
    populateDropdowns();
    startEl.value = new Date().toISOString().split('T')[0];
    endEl.value = new Date(new Date().getFullYear(), 11, 31).toISOString().split('T')[0];
    updateRangeInfo();
    loadSettings();
    loadEntries();   // your existing function to load iqama schedules
  </script>
</body>
</html>

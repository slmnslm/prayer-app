<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salat & Iqama Timings</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #7f8c8d;
      margin-bottom: 25px;
    }
    .location-input {
      text-align: center;
      margin-bottom: 25px;
    }
    input[type="text"] {
      padding: 12px;
      width: 160px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      padding: 12px 24px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #2980b9; }

    .next-prayer-box {
      background: #e8f4fd;
      border: 3px solid #3498db;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin: 25px 0;
      transition: all 0.4s;
    }
    .next-prayer-box.near {
      background: #d4edda;
      border-color: #27ae60;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }

    .countdown {
      font-size: 32px;
      font-weight: bold;
      color: #2c3e50;
      margin: 12px 0;
    }

    .timings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }
    .prayer {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      transition: all 0.3s;
    }
    .prayer.current {
      background: #d5f4e6;
      border: 2px solid #27ae60;
      transform: scale(1.04);
    }
    .prayer-name {
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 8px;
    }
    .salat-time, .iqama-time {
      font-size: 18px;
      margin: 4px 0;
    }

    .admin-link {
      text-align: center;
      margin: 25px 0;
    }
    .admin-link a {
      color: #e74c3c;
      text-decoration: none;
      font-weight: bold;
    }
    .note {
      font-size: 13px;
      color: #7f8c8d;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Salat & Iqama Timings</h1>
    <p class="subtitle">Oakville, Canada</p>

    <div class="location-input">
      <input type="text" id="city" value="Oakville" placeholder="City">
      <input type="text" id="country" value="Canada" placeholder="Country">
      <button onclick="fetchTimings()">Refresh</button>
    </div>

    <div id="nextPrayerBox" class="next-prayer-box">
      <strong>Next Iqama</strong><br>
      <span id="nextPrayerName" style="font-size:20px;">—</span><br>
      <div class="countdown" id="countdown">—</div>
      <small id="nextAt">—</small>
    </div>

    <div class="admin-link">
      <a href="/admin" target="_blank">🔧 Admin Panel - Manage Iqama Times</a>
    </div>

    <div id="timings" class="timings"></div>

    <div class="note">
      Salat times from AlAdhan API (ISNA Method)<br>
      Iqama times managed via Admin Panel<br>
      <strong>https://mnh.slmnslm.theworkpc.com</strong>
    </div>
  </div>

  <script>
    const prayers = ['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
    const iqamaPrayers = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
    let timingsData = null;
    let iqamaData = null;

    function timeToMinutes(t) {
      if (!t) return 0;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function getNextPrayer() {
      if (!timingsData || !iqamaData) return null;
      const now = new Date();
      const curMin = now.getHours() * 60 + now.getMinutes();

      let upcoming = [];
      for (let p of iqamaPrayers) {
        const t = timeToMinutes(iqamaData[p] || timingsData[p]);
        if (t > curMin) upcoming.push({name: p, min: t});
      }

      if (upcoming.length === 0) {
        return { name: "Fajr", isTomorrow: true, timeStr: iqamaData.Fajr || timingsData.Fajr };
      }

      upcoming.sort((a,b) => a.min - b.min);
      return { name: upcoming[0].name, timeStr: iqamaData[upcoming[0].name] || timingsData[upcoming[0].name], isTomorrow: false };
    }

    function updateCountdown() {
      const next = getNextPrayer();
      if (!next) return;

      const now = new Date();
      let target = timeToMinutes(next.timeStr);
      let current = now.getHours()*60 + now.getMinutes();
      let diff = next.isTomorrow ? (1440 - current) + target : target - current;

      const h = Math.floor(diff / 60);
      const m = diff % 60;
      const s = 59 - now.getSeconds();

      document.getElementById('nextPrayerName').textContent = next.name + (next.isTomorrow ? " (Tomorrow)" : "");
      document.getElementById('countdown').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      document.getElementById('nextAt').textContent = `at ${next.timeStr}`;

      const box = document.getElementById('nextPrayerBox');
      box.classList.remove('near');
      if (diff <= 15) box.classList.add('near');
    }

    async function fetchTimings() {
      const city = document.getElementById('city').value || 'Oakville';
      const country = document.getElementById('country').value || 'Canada';

      try {
        const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=${encodeURIComponent(country)}&method=2`);
        const data = await res.json();
        if (data.code !== 200) throw new Error("Failed to fetch timings");

        timingsData = data.data.timings;

        const iqRes = await fetch('/api/iqama');
        const iqData = await iqRes.json();
        iqamaData = iqData.iqama || {};

        displayTimings();
      } catch (err) {
        console.error(err);
        alert("Could not load prayer times. Please check your connection.");
      }
    }

    function displayTimings() {
      const container = document.getElementById('timings');
      container.innerHTML = '';
      const nowMin = new Date().getHours() * 60 + new Date().getMinutes();

      prayers.forEach(prayer => {
        const div = document.createElement('div');
        div.className = 'prayer';
        const salat = timingsData[prayer] || '—';
        const iqama = iqamaData[prayer] || '—';

        if (salat !== '—') {
          const salatMin = timeToMinutes(salat);
          if (salatMin >= nowMin - 15 && salatMin <= nowMin + 45) {
            div.classList.add('current');
          }
        }

        div.innerHTML = `
          <div class="prayer-name">${prayer}</div>
          <div class="salat-time">Adhan: ${salat}</div>
          <div class="iqama-time">Iqama: ${iqama}</div>
        `;
        container.appendChild(div);
      });

      updateCountdown();
    }

    // Initialize
    window.onload = () => {
      fetchTimings();
      setInterval(updateCountdown, 1000);
      // Auto refresh at midnight
      setTimeout(() => location.reload(), (new Date().setHours(24,0,1,0) - Date.now()));
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Manage Iqama Times</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1, h2 {
      text-align: center;
      color: #2c3e50;
    }
    .section {
      margin: 35px 0;
      padding: 25px;
      background: #f9f9f9;
      border-radius: 12px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #2c3e50;
    }
    input[type="date"], select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    .time-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-primary { background: #27ae60; color: white; }
    .btn-primary:hover { background: #219653; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-edit { background: #3498db; color: white; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #ecf0f1;
    }
    .actions button {
      margin-right: 6px;
      padding: 8px 14px;
      font-size: 14px;
    }
    .message {
      text-align: center;
      padding: 14px;
      border-radius: 8px;
      margin: 15px 0;
      font-weight: bold;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .note {
      text-align: center;
      color: #7f8c8d;
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Admin Panel - Iqama Times Management</h1>
    <p style="text-align:center; color:#7f8c8d;">https://mnh.slmnslm.theworkpc.com</p>

    <!-- Form Section -->
    <div class="section">
      <h2>Set / Edit Iqama Times for Date Range</h2>
      <form id="iqamaForm">
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="startDate" required>
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input type="date" id="endDate" required>
        </div>
        <div id="rangeInfo" style="font-size:14px; color:#555; margin:10px 0 20px;"></div>

        <div class="form-group">
          <label>Fajr Iqama</label>
          <div class="time-row">
            <select id="fajr_hour" required><option value="">HH</option></select> :
            <select id="fajr_minute" required><option value="">MM</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Dhuhr Iqama</label>
          <div class="time-row">
            <select id="dhuhr_hour" required><option value="">HH</option></select> :
            <select id="dhuhr_minute" required><option value="">MM</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Asr Iqama</label>
          <div class="time-row">
            <select id="asr_hour" required><option value="">HH</option></select> :
            <select id="asr_minute" required><option value="">MM</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Maghrib Iqama</label>
          <div class="time-row">
            <select id="maghrib_hour" required><option value="">HH</option></select> :
            <select id="maghrib_minute" required><option value="">MM</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Isha Iqama</label>
          <div class="time-row">
            <select id="isha_hour" required><option value="">HH</option></select> :
            <select id="isha_minute" required><option value="">MM</option></select>
          </div>
        </div>

        <div style="display:flex; gap:15px; margin-top:25px;">
          <button type="submit" class="btn-primary">Save for Date Range</button>
          <button type="button" id="clearForm" class="btn-secondary">Clear Form</button>
        </div>
      </form>
      <div id="message" class="message"></div>
    </div>

    <!-- Existing Schedules Table -->
    <div class="section">
      <h2>Existing Iqama Schedules</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Fajr</th>
            <th>Dhuhr</th>
            <th>Asr</th>
            <th>Maghrib</th>
            <th>Isha</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="entriesBody"></tbody>
      </table>
    </div>

    <div class="note">
      Changes are saved directly to the database.<br>
      <strong>Live Site:</strong> <a href="https://mnh.slmnslm.theworkpc.com" target="_blank">mnh.slmnslm.theworkpc.com</a>
    </div>
  </div>

  <script>
    const prayers = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];
    const startEl = document.getElementById('startDate');
    const endEl = document.getElementById('endDate');
    const msgEl = document.getElementById('message');

    // Populate hour and minute dropdowns
    function populateDropdowns() {
      prayers.forEach(p => {
        const hourSelect = document.getElementById(p + '_hour');
        const minSelect = document.getElementById(p + '_minute');

        // Hours 00-23
        for (let i = 0; i < 24; i++) {
          const opt = document.createElement('option');
          opt.value = i.toString().padStart(2, '0');
          opt.textContent = opt.value;
          hourSelect.appendChild(opt);
        }

        // Minutes (5-minute intervals)
        [0,5,10,15,20,25,30,35,40,45,50,55].forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.toString().padStart(2, '0');
          opt.textContent = opt.value;
          minSelect.appendChild(opt);
        });
      });
    }

    function updateRangeInfo() {
      if (startEl.value && endEl.value) {
        const start = new Date(startEl.value);
        const end = new Date(endEl.value);
        const days = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
        document.getElementById('rangeInfo').textContent = `Will apply to ${days} day${days > 1 ? 's' : ''}`;
      }
    }

    async function loadEntries() {
      try {
        const res = await fetch('/api/iqama/all');
        const data = await res.json();
        const tbody = document.getElementById('entriesBody');
        tbody.innerHTML = '';

        if (data.entries && data.entries.length > 0) {
          data.entries.forEach(entry => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${entry.date}</td>
              <td>${entry.Fajr || '—'}</td>
              <td>${entry.Dhuhr || '—'}</td>
              <td>${entry.Asr || '—'}</td>
              <td>${entry.Maghrib || '—'}</td>
              <td>${entry.Isha || '—'}</td>
              <td class="actions">
                <button class="btn-edit" onclick="editDate('${entry.date}')">Edit</button>
                <button class="btn-danger" onclick="deleteDate('${entry.date}')">Delete</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px;">No Iqama times saved yet.</td></tr>`;
        }
      } catch (err) {
        showMessage('Failed to load schedules', 'error');
      }
    }

    window.editDate = async (date) => {
      startEl.value = endEl.value = date;
      updateRangeInfo();

      try {
        const res = await fetch(`/api/iqama/date?date=${date}`);
        const data = await res.json();
        const iq = data.iqama || {};

        prayers.forEach(p => {
          const time = iq[p.charAt(0).toUpperCase() + p.slice(1)];
          if (time) {
            const [h, m] = time.split(':');
            document.getElementById(p + '_hour').value = h;
            document.getElementById(p + '_minute').value = m;
          }
        });
        showMessage(`Loaded ${date} for editing`, 'success');
      } catch (err) {
        showMessage('Failed to load date', 'error');
      }
    };

    window.deleteDate = async (date) => {
      if (!confirm(`Delete all Iqama times for ${date}?`)) return;
      try {
        const res = await fetch('/admin/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date })
        });
        const result = await res.json();
        showMessage(result.message, res.ok ? 'success' : 'error');
        if (res.ok) loadEntries();
      } catch (err) {
        showMessage('Delete failed', 'error');
      }
    };

    function showMessage(text, type) {
      msgEl.textContent = text;
      msgEl.className = `message ${type}`;
      setTimeout(() => {
        msgEl.textContent = '';
        msgEl.className = 'message';
      }, 5000);
    }

    // Form Submit
    document.getElementById('iqamaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = {
        startDate: startEl.value,
        endDate: endEl.value
      };

      prayers.forEach(p => {
        const h = document.getElementById(p + '_hour').value;
        const m = document.getElementById(p + '_minute').value;
        formData[p] = (h && m) ? `${h}:${m}` : '';
      });

      try {
        const res = await fetch('/admin/save-range', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        const result = await res.json();
        showMessage(result.message, res.ok ? 'success' : 'error');
        if (res.ok) loadEntries();
      } catch (err) {
        showMessage('Save failed', 'error');
      }
    });

    // Clear Form
    document.getElementById('clearForm').addEventListener('click', () => {
      document.getElementById('iqamaForm').reset();
      const today = new Date().toISOString().split('T')[0];
      startEl.value = today;
      endEl.value = new Date(new Date().getFullYear(), 11, 31).toISOString().split('T')[0];
      updateRangeInfo();
    });

    // Initialize
    populateDropdowns();
    startEl.value = new Date().toISOString().split('T')[0];
    endEl.value = new Date(new Date().getFullYear(), 11, 31).toISOString().split('T')[0];
    updateRangeInfo();
    loadEntries();
  </script>
</body>
</html>
